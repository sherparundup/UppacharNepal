<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U x Machina</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <!-- Header -->
    <header>
        <nav>
            <div class="logo">
                <span>U</span class="cross"> × <span class="word-animate" data-word="Machina">Machina</span>
            </div>
            <ul class="nav-links">
                <li><a href="#home"><span class="nav-number numnav">/01</span><span class="word-animate" data-word="Home">Home</span></a></li>
                <li><a href="#about"><span class="nav-number numnav">/02</span><span class="word-animate" data-word="About">About</span></a></li>
                <li><a href="#contact"><span class="nav-number numnav">/03</span><span class="word-animate" data-word="Contact">Contact</span></a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="logo-container">
            <div class="cross-design">
                <!-- Spheres -->
                <div class="sphere"></div>
                
                <div class="sphere"></div>
                <div class="sphere"></div>
                <div class="sphere"></div>
                
                <!-- Lines -->
                <div class="line"></div>
                <div class="line"></div>
            </div>
            
            <!-- Brand Text -->
            <div class="brand-text left">U</div>
            <div class="brand-text right word-animate" data-word="Machina">Machina</div>
        </div>
    </main>

    <!-- Bottom Section -->
    <div class="bottom-section">
        <a href="#contact" class="lets-talk-btn">LET'S TALK</a>
        <div class="email-icon">
            <svg viewBox="0 0 24 24">
                <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.89 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
            </svg>
        </div>
    </div>

    <script src="action.js">
     
    </script>
</body>
</html>
